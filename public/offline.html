<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0bb884">
    <title>Tekvista Offline</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at 18% 12%, rgba(11, 184, 132, 0.28), transparent 32rem),
                radial-gradient(circle at 82% 86%, rgba(36, 214, 176, 0.24), transparent 26rem),
                linear-gradient(145deg, #effcf6 0%, #d9f5ea 46%, #c9f0e1 100%);
            color: #073327;
            font-family: "DM Sans", "Segoe UI", system-ui, sans-serif;
            padding: 20px;
        }

        main {
            width: min(92vw, 560px);
            border: 1px solid rgba(11, 184, 132, 0.28);
            border-radius: 20px;
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.92), rgba(244, 255, 250, 0.9));
            padding: 32px;
            box-shadow: 0 24px 62px rgba(4, 64, 47, 0.18);
            backdrop-filter: blur(10px);
        }

        .logo-wrap {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.98);
            border: 1px solid rgba(11, 184, 132, 0.26);
            box-shadow: 0 10px 30px rgba(4, 64, 47, 0.15);
            margin-bottom: 18px;
        }

        .logo-wrap img {
            width: min(100%, 280px);
            height: auto;
        }

        h1 {
            margin: 0 0 10px;
            font-size: clamp(28px, 5vw, 34px);
            line-height: 1.15;
            letter-spacing: -0.02em;
        }

        p {
            margin: 0;
            color: #2d6151;
            line-height: 1.75;
        }
    </style>
</head>
<body>
    <main>
        <span class="logo-wrap">
            <img src="/branding/tekvista-logo.png" alt="Tekvista logo">
        </span>
        <h1>Tekvista is offline-ready.</h1>
        <p>Your network connection is unavailable. The main app shell is cached, so return to the home page once the connection is restored.</p>
    </main>
</body>
</html>
