<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0bb884">
    <title>Tekvista Offline</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #f5f7f8;
            color: #152426;
            font-family: Inter, Segoe UI, system-ui, sans-serif;
        }

        main {
            width: min(92vw, 560px);
            border: 1px solid #dbe4e6;
            border-radius: 8px;
            background: #ffffff;
            padding: 32px;
            box-shadow: 0 20px 60px rgba(11, 59, 60, .12);
        }

        h1 {
            margin: 0 0 12px;
            font-size: 32px;
            line-height: 1.1;
        }

        p {
            margin: 0;
            color: #53666a;
            line-height: 1.7;
        }
    </style>
</head>
<body>
    <main>
        <h1>Tekvista is offline-ready.</h1>
        <p>Your network connection is unavailable. The main app shell is cached, so return to the home page once the connection is restored.</p>
    </main>
</body>
</html>
